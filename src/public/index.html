<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BillTrack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#006c49" />
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png" />
</head>
<body>
  <div class="app-container">

    <!-- Header -->
    <header class="app-header">
      <div class="header-inner">
        <a href="#" id="brand-link" class="app-brand" aria-label="Ir para o mês atual">
          <svg class="brand-icon" viewBox="0 0 512 512" aria-hidden="true">
            <rect width="512" height="512" rx="64" fill="#006c49"/>
            <rect x="128" y="248" width="120" height="16" rx="8" fill="#ffffff"/>
            <path d="M 296 256 L 336 296 L 400 224"
                  fill="none" stroke="#ffffff" stroke-width="32"
                  stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>BILLTRACK</span>
        </a>
        <nav class="month-nav">
          <button id="btn-prev-month" class="btn-ghost btn-icon" aria-label="Mês anterior">&#8592; Anterior</button>
          <h1 id="month-title" class="month-title">---</h1>
          <button id="btn-next-month" class="btn-ghost btn-icon" aria-label="Próximo mês">Próximo &#8594;</button>
        </nav>
        <button id="btn-logout" class="btn-ghost" aria-label="Sair">Sair</button>
      </div>
    </header>

    <main class="main-content">

      <!-- Summary -->
      <section id="summary-section" class="summary-section">
        <div class="summary-grid">
          <div class="summary-card">
            <span class="summary-label">Total do mês</span>
            <span id="summary-total" class="summary-value mono-data">R$ 0,00</span>
          </div>
          <div class="summary-card">
            <span class="summary-label">Pago</span>
            <span id="summary-paid" class="summary-value mono-data paid">R$ 0,00</span>
          </div>
          <div class="summary-card">
            <span class="summary-label">Pendente</span>
            <span id="summary-pending" class="summary-value mono-data pending">R$ 0,00</span>
          </div>
          <div class="summary-card">
            <span class="summary-label">Contas pendentes</span>
            <span id="summary-pending-count" class="summary-value mono-data pending">0</span>
          </div>
        </div>
      </section>

      <!-- Add Bill Form -->
      <section class="add-bill-section">
        <form id="add-bill-form" class="add-bill-form">
          <input
            id="input-name"
            type="text"
            placeholder="Nome da conta"
            class="input-field"
            autocomplete="off"
            required
          />
          <input
            id="input-amount"
            type="number"
            placeholder="Valor"
            class="input-field input-amount"
            min="0"
            step="0.01"
            required
          />
          <button type="submit" class="btn-primary">Adicionar</button>
        </form>
        <p id="add-error" class="form-error" hidden></p>
      </section>

      <!-- Filters -->
      <div class="filters-bar">
        <button class="btn-filter active" data-filter="">Todas</button>
        <button class="btn-filter" data-filter="pending">Pendentes</button>
        <button class="btn-filter" data-filter="paid">Pagas</button>
      </div>

      <!-- Bills List -->
      <section class="bills-section">
        <ul id="bills-list" class="bills-list">
          <li class="bills-empty" id="bills-loading">Carregando...</li>
        </ul>

        <!-- Filter empty — month has bills, but active filter matches none -->
        <p id="filter-empty-message" class="filter-empty-message" hidden></p>

        <!-- Empty state — month has no bills at all -->
        <div id="empty-state" class="empty-state" hidden>
          <h2 class="empty-title">Mês em branco</h2>
          <p class="empty-message">Adicione contas no campo acima ou copie de um mês anterior.</p>
          <button id="btn-duplicate" class="btn-ghost">Copiar do mês anterior</button>
        </div>
      </section>

    </main>
  </div>

  <script src="/app.js"></script>
</body>
</html>
